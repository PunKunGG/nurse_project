<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Reset Password</title>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <main class="container">
      <section class="card" style="text-align: center; padding: 26px">
        <h1 style="margin-bottom: 6px">ตั้งรหัสผ่านใหม่</h1>
        <p style="color: #64748b; margin-top: 0">
          กรุณากรอกรหัสผ่านใหม่สำหรับบัญชีของคุณ
        </p>
      </section>

      <section class="card" style="margin-top: 14px">
        <h3 style="margin-top: 0">รีเซ็ตรหัสผ่าน</h3>

        <label for="new_pass"><small>รหัสผ่านใหม่</small></label>
        <input
          id="new_pass"
          type="password"
          placeholder="อย่างน้อย 6 ตัวอักษร"
          autocomplete="new-password"
          style="
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            width: 100%;
            margin: 6px 0 12px;
            background: #ffffff;
            color: #0f172a;
          "
        />

        <label for="confirm_new_pass"><small>ยืนยันรหัสผ่านใหม่</small></label>
        <input
          id="confirm_new_pass"
          type="password"
          placeholder="พิมพ์รหัสผ่านใหม่อีกครั้ง"
          autocomplete="new-password"
          style="
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            width: 100%;
            margin: 6px 0 12px;
            background: #ffffff;
            color: #0f172a;
          "
        />

        <button id="btn_update_pass" class="btn" type="button">
          บันทึกรหัสผ่านใหม่
        </button>
        <p id="msg_reset_password" style="margin-top: 10px"><small></small></p>

        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 14px 0" />

        <a class="btn btn-ghost" href="login.html">กลับไปหน้าเข้าสู่ระบบ</a>
      </section>

      <script type="module">
        import {
          getSession,
          signOut,
          updatePassword,
        } from "./assets/js/auth.js";

        const msg = document.getElementById("msg_reset_password");

        async function ensureRecoverySession() {
          try {
            const session = await getSession();
            if (!session) {
              msg.innerHTML =
                "<small style='color:#ef4444;'>ลิงก์รีเซ็ตอาจหมดอายุหรือไม่ถูกต้อง กรุณากลับไปกดลืมรหัสผ่านใหม่อีกครั้ง</small>";
              document.getElementById("btn_update_pass").disabled = true;
            }
          } catch (e) {
            msg.innerHTML = `<small style=\"color:#ef4444;\">ตรวจสอบลิงก์ไม่สำเร็จ: ${e.message}</small>`;
            document.getElementById("btn_update_pass").disabled = true;
          }
        }

        document
          .getElementById("btn_update_pass")
          .addEventListener("click", async () => {
            const newPass = document.getElementById("new_pass").value;
            const confirmPass =
              document.getElementById("confirm_new_pass").value;

            if (!newPass || !confirmPass) {
              msg.innerHTML =
                "<small style='color:#ef4444;'>กรุณากรอกรหัสผ่านใหม่ให้ครบถ้วน</small>";
              return;
            }

            if (newPass !== confirmPass) {
              msg.innerHTML =
                "<small style='color:#ef4444;'>รหัสผ่านใหม่และยืนยันรหัสผ่านไม่ตรงกัน</small>";
              return;
            }

            msg.innerHTML = "<small>กำลังบันทึกรหัสผ่านใหม่…</small>";
            try {
              await updatePassword(newPass);
              msg.innerHTML =
                "<small style='color:#22c55e;'>บันทึกรหัสผ่านใหม่สำเร็จ กำลังกลับไปหน้าเข้าสู่ระบบ…</small>";

              await signOut();

              setTimeout(() => {
                window.location.href = "login.html";
              }, 900);
            } catch (e) {
              msg.innerHTML = `<small style=\"color:#ef4444;\">รีเซ็ตรหัสผ่านไม่สำเร็จ: ${e.message}</small>`;
            }
          });

        ensureRecoverySession();
      </script>
    </main>
    <script src="assets/js/theme.js"></script>
  </body>
</html>
