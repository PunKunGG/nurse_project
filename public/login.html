<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Login</title>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <main class="container">
      <section class="card" style="text-align: center; padding: 26px">
        <h1 style="margin-bottom: 6px">เข้าสู่ระบบ</h1>
        <p style="color: #64748b; margin-top: 0">
          Nurse Learning Platform | ระบบการเรียนรู้เชิงเกม
        </p>
      </section>

      <section class="card" style="margin-top: 14px">
        <h3 style="margin-top: 0">ล็อกอิน</h3>

        <label for="li_email"
          ><small>อีเมล (@kkumail.com หรือ @kku.ac.th)</small></label
        >
        <input
          id="li_email"
          type="email"
          placeholder="example@kkumail.com หรือ @kku.ac.th"
          autocomplete="email"
          style="
            padding: 12px;
            border-radius: 12px;
            border: 1px solid #cbd5e1;
            width: 100%;
            margin: 6px 0 12px;
            background: #ffffff;
            color: #0f172a;
          "
        />

        <label for="li_pass"><small>รหัสผ่าน</small></label>
        <div style="position: relative">
          <input
            id="li_pass"
            type="password"
            placeholder="อย่างน้อย 6 ตัวอักษร"
            autocomplete="current-password"
            style="
              padding: 12px;
              padding-right: 45px;
              border-radius: 12px;
              border: 1px solid #cbd5e1;
              width: 100%;
              margin: 6px 0 12px;
              background: #ffffff;
              color: #0f172a;
            "
          />
          <button
            type="button"
            id="toggle_li_pass"
            style="
              position: absolute;
              right: 12px;
              top: 50%;
              transform: translateY(-50%);
              background: none;
              border: none;
              cursor: pointer;
              padding: 4px;
              color: #64748b;
              font-size: 18px;
            "
            title="แสดง/ซ่อนรหัสผ่าน"
          >
            👁️
          </button>
        </div>

        <button id="btn_login" class="btn" type="button">เข้าสู่ระบบ</button>
        <p id="msg_login" style="margin-top: 10px"><small></small></p>
        <button
          id="btn_forgot_pass"
          type="button"
          style="
            margin-top: 6px;
            background: none;
            border: none;
            color: #2563eb;
            cursor: pointer;
            padding: 0;
            font-family: var(--font);
            font-weight: 700;
            font-size: 0.9rem;
            text-decoration: underline;
          "
        >
          ลืมรหัสผ่าน?
        </button>
        <p id="msg_reset" style="margin-top: 8px"><small></small></p>

        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 14px 0" />

        <a class="btn btn-ghost" href="register.html"
          >ยังไม่มีบัญชี? สมัครสมาชิก</a
        >
        <a class="btn btn-ghost" href="index.html" style="margin-top: 8px"
          >กลับหน้าแรก</a
        >
      </section>

      <script type="module">
        import { signIn, requestPasswordReset } from "./assets/js/auth.js";

        const mli = document.getElementById("msg_login");
        const mReset = document.getElementById("msg_reset");
        let loginMsgTimer = null;
        let resetMsgTimer = null;

        function showTimedMessage(target, html, timerName) {
          target.innerHTML = html;

          if (timerName === "login") {
            clearTimeout(loginMsgTimer);
            loginMsgTimer = setTimeout(() => {
              target.innerHTML = "<small></small>";
            }, 5000);
          } else {
            clearTimeout(resetMsgTimer);
            resetMsgTimer = setTimeout(() => {
              target.innerHTML = "<small></small>";
            }, 5000);
          }
        }

        // Toggle password visibility
        document
          .getElementById("toggle_li_pass")
          .addEventListener("click", () => {
            const passInput = document.getElementById("li_pass");
            const toggleBtn = document.getElementById("toggle_li_pass");
            if (passInput.type === "password") {
              passInput.type = "text";
              toggleBtn.textContent = "🙈";
            } else {
              passInput.type = "password";
              toggleBtn.textContent = "👁️";
            }
          });

        // ปุ่ม Login
        document
          .getElementById("btn_login")
          .addEventListener("click", async () => {
            mli.innerHTML = "<small>กำลังเข้าสู่ระบบ…</small>";
            try {
              const email = document.getElementById("li_email").value.trim();
              const pass = document.getElementById("li_pass").value;

              await signIn(email, pass);

              showTimedMessage(
                mli,
                "<small style='color:#22c55e;'>เข้าสู่ระบบสำเร็จ! กำลังเปลี่ยนหน้า…</small>",
                "login",
              );

              setTimeout(() => {
                window.location.href = "dashboard.html";
              }, 500);
            } catch (e) {
              showTimedMessage(
                mli,
                `<small style="color:#ef4444;">ล็อกอินไม่สำเร็จ: ${e.message}</small>`,
                "login",
              );
            }
          });

        // ลืมรหัสผ่าน: ส่งอีเมลรีเซ็ตไปยังอีเมลที่กรอก
        document
          .getElementById("btn_forgot_pass")
          .addEventListener("click", async () => {
            const email = document.getElementById("li_email").value.trim();

            if (!email) {
              mReset.innerHTML =
                "<small style='color:#ef4444;'>กรุณากรอกอีเมลก่อนกดลืมรหัสผ่าน</small>";
              return;
            }

            mReset.innerHTML = "<small>กำลังส่งอีเมลรีเซ็ตรหัสผ่าน…</small>";
            try {
              const redirectTo = new URL(
                "reset_password.html",
                window.location.href,
              ).toString();

              await requestPasswordReset(email, redirectTo);

              showTimedMessage(
                mReset,
                "<small style='color:#22c55e;'>ส่งลิงก์รีเซ็ตรหัสผ่านแล้ว กรุณาตรวจสอบอีเมลของคุณ</small>",
                "reset",
              );
            } catch (e) {
              showTimedMessage(
                mReset,
                `<small style="color:#ef4444;">ส่งอีเมลไม่สำเร็จ: ${e.message}</small>`,
                "reset",
              );
            }
          });

        // กด Enter ใน password input เพื่อ submit
        document.getElementById("li_pass").addEventListener("keypress", (e) => {
          if (e.key === "Enter") {
            document.getElementById("btn_login").click();
          }
        });
      </script>
    </main>
    <script src="assets/js/theme.js"></script>
  </body>
</html>
