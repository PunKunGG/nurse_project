<!doctype html>
<html lang="th">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Register</title>
    <link rel="stylesheet" href="assets/css/main.css" />
  </head>
  <body>
    <main class="container">
      <section class="card" style="text-align: center; padding: 26px">
        <h1 style="margin-bottom: 6px">สมัครสมาชิก</h1>
        <p style="color: #64748b; margin-top: 0">
          สร้างบัญชีเพื่อทำแบบทดสอบและรับเกียรติบัตร
        </p>
      </section>

      <section class="card" style="margin-top: 14px">
        <h3 style="margin-top: 0">ข้อมูลผู้สมัคร</h3>

        <form id="form">
          <label for="fullName"><small>ชื่อ-สกุล</small></label>
          <input
            id="fullName"
            required
            placeholder="เช่น นิสลิ วินเทอร์โฟล"
            style="
              padding: 12px;
              border-radius: 12px;
              border: 1px solid #cbd5e1;
              width: 100%;
              margin: 6px 0 12px;
              background: #ffffff;
              color: #0f172a;
            "
          />

          <label for="studentId"><small>รหัสนักศึกษา</small></label>
          <input
            id="studentId"
            required
            placeholder="663380xxx-x"
            pattern="[0-9]{9}-[0-9]"
            title="กรุณากรอกรหัสนักศึกษาเป็นตัวเลข 9 หลัก ตามด้วยขีด และเลข 1 หลัก เช่น 663380123-4"
            style="
              padding: 12px;
              border-radius: 12px;
              border: 1px solid #cbd5e1;
              width: 100%;
              margin: 6px 0 12px;
              background: #ffffff;
              color: #0f172a;
            "
          />

          <label for="email"
            ><small>Email (@kkumail.com หรือ @kku.ac.th)</small></label
          >
          <input
            id="email"
            type="email"
            required
            placeholder="example@kkumail.com หรือ @kku.ac.th"
            autocomplete="email"
            style="
              padding: 12px;
              border-radius: 12px;
              border: 1px solid #cbd5e1;
              width: 100%;
              margin: 6px 0 12px;
              background: #ffffff;
              color: #0f172a;
            "
          />

          <label for="password"><small>Password</small></label>
          <div style="position: relative">
            <input
              id="password"
              type="password"
              required
              minlength="6"
              placeholder="อย่างน้อย 6 ตัวอักษร"
              autocomplete="new-password"
              style="
                padding: 12px;
                padding-right: 45px;
                border-radius: 12px;
                border: 1px solid #cbd5e1;
                width: 100%;
                margin: 6px 0 14px;
                background: #ffffff;
                color: #0f172a;
              "
            />
            <button
              type="button"
              id="toggle_password"
              style="
                position: absolute;
                right: 12px;
                top: 50%;
                transform: translateY(-50%);
                background: none;
                border: none;
                cursor: pointer;
                padding: 4px;
                color: #64748b;
                font-size: 18px;
              "
              title="แสดง/ซ่อนรหัสผ่าน"
            >
              👁️
            </button>
          </div>

          <button class="btn" type="submit">สมัครสมาชิก</button>

          <p class="pdpa-notice">
            <small>
              การสมัครสมาชิกถือว่าคุณยอมรับ<a
                href="privacy.html"
                target="_blank"
                >นโยบายความเป็นส่วนตัว (PDPA)</a
              >
            </small>
          </p>
        </form>

        <p id="msg"><small></small></p>

        <hr style="border: 0; border-top: 1px solid #e2e8f0; margin: 14px 0" />

        <a class="btn btn-ghost" href="login.html">มีบัญชีแล้ว? เข้าสู่ระบบ</a>
        <a class="btn btn-ghost" href="index.html" style="margin-top: 8px"
          >กลับหน้าแรก</a
        >
      </section>

      <script type="module">
        import { signUp } from "./assets/js/auth.js";

        const form = document.getElementById("form");
        const msg = document.getElementById("msg");

        // Toggle password visibility
        document
          .getElementById("toggle_password")
          .addEventListener("click", () => {
            const passInput = document.getElementById("password");
            const toggleBtn = document.getElementById("toggle_password");
            if (passInput.type === "password") {
              passInput.type = "text";
              toggleBtn.textContent = "👁️";
            } else {
              passInput.type = "password";
              toggleBtn.textContent = "👁️";
            }
          });

        form.addEventListener("submit", async (e) => {
          e.preventDefault();
          msg.innerHTML = "<small>กำลังสมัคร…</small>";

          const fullName = document.getElementById("fullName").value.trim();
          const studentId = document.getElementById("studentId").value.trim();
          const email = document.getElementById("email").value.trim();
          const password = document.getElementById("password").value;
          const studentIdRegex = /^[0-9]{9}-[0-9]$/;

          if (!studentIdRegex.test(studentId)) {
            msg.innerHTML =
              "<small style='color:#ef4444;'>รหัสนักศึกษาต้องเป็นตัวเลข 9 หลัก ตามด้วยขีดและเลข 1 หลัก เช่น 663380123-4</small>";
            return;
          }

          try {
            const result = await signUp(email, password, fullName, studentId);

            if (result.needsEmailConfirm) {
              msg.innerHTML = `<small style="color:#16a34a;">สมัครสำเร็จ ✅ กรุณายืนยันอีเมลก่อนเข้าสู่ระบบ</small>`;
            } else {
              msg.innerHTML = `<small style="color:#16a34a;">สมัครสำเร็จ ✅ ไปหน้าเข้าสู่ระบบได้เลย</small>`;
              setTimeout(() => (window.location.href = "login.html"), 700);
            }
          } catch (error) {
            msg.innerHTML = `<small style="color:#ef4444;">สมัครไม่สำเร็จ: ${error.message}</small>`;
          }
        });
      </script>
    </main>
    <script src="assets/js/theme.js"></script>
  </body>
</html>
